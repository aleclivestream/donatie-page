<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Donații</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --line:#2a2a2a;
  --text:#f3f2ee;
  --muted:#8f8d87;
  --red:#c8202a;
  --red-dim:#5e1015;
}

*{box-sizing:border-box; margin:0; padding:0;}

html,body{height:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:24px;
}

/* particule plutitoare in fundal */
.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.particle{
  position:absolute;
  bottom:-40px;
  font-size:18px;
  opacity:0;
  animation:rise linear infinite;
  color:var(--red);
  filter:drop-shadow(0 0 6px var(--red-dim));
}
@keyframes rise{
  0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
  8%{ opacity:.55; }
  90%{ opacity:.35; }
  100%{ transform:translateY(-110vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
}

.wrap{
  position:relative;
  z-index:1;
  max-width:560px;
  text-align:center;
}

.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  letter-spacing:.25em;
  color:var(--red);
  text-transform:uppercase;
  margin-bottom:14px;
}

h1{
  font-family:'Anton',sans-serif;
  font-weight:400;
  transform:skewX(-6deg);
  font-size:clamp(48px,10vw,92px);
  line-height:.85;
  letter-spacing:.01em;
}
h1 span{color:var(--red);}

.subhead{
  margin-top:34px;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  line-height:1.6;
  min-height:22px;
  transition:color .25s ease;
  position:relative;
  cursor:default;
}

.wink{
  display:inline-block;
  margin-left:8px;
  color:var(--red);
  font-family:'JetBrains Mono',monospace;
  text-transform:none;
  opacity:0;
  transform:translateY(4px) scale(.7);
  transition:opacity .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1);
}
.wink.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

.card{
  margin-top:48px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:6px;
  padding:40px 28px;
  position:relative;
  overflow:visible;
  transition:padding .25s ease;
}
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 0%, var(--red-dim) 0%, transparent 65%);
  opacity:.5;
  pointer-events:none;
}

.label{
  position:relative;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:18px;
  height:14px;
}

#donateBtn{
  position:relative;
  z-index:1;
  font-family:'Anton',sans-serif;
  font-size:clamp(26px,5vw,38px);
  letter-spacing:.01em;
  color:#000;
  background:var(--red);
  border:none;
  border-radius:6px;
  padding:18px 38px;
  cursor:pointer;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .25s ease,
             font-size .3s cubic-bezier(.34,1.2,.64,1), padding .3s cubic-bezier(.34,1.2,.64,1);
}
#donateBtn:hover{
  background:#ff2b38;
}
#donateBtn.bump{
  animation:bump .35s ease;
}
@keyframes bump{
  0%{ transform:scale(1); }
  35%{ transform:scale(1.12) rotate(-1deg); }
  60%{ transform:scale(.96) rotate(1deg); }
  100%{ transform:scale(1); }
}

#donateBtn.pop{
  animation:pop .5s cubic-bezier(.36,0,.66,-0.56);
}
@keyframes pop{
  0%{ transform:scale(1); opacity:1; background:var(--red); }
  45%{ transform:scale(1.35); opacity:0; background:#fff; }
  55%{ transform:scale(1); opacity:0; }
  100%{ transform:scale(1); opacity:1; background:var(--red); }
}

.caption{
  position:relative;
  z-index:1;
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
  min-height:18px;
  transition:opacity .15s ease;
}

.footer-note{
  margin-top:28px;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.08em;
  color:var(--muted);
  opacity:.6;
}

.less-row{
  position:relative;
  z-index:1;
  margin-top:26px;
  padding-top:22px;
  border-top:1px dashed var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
}

#lessBtn{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--muted);
  background:transparent;
  border:1px solid var(--line);
  border-radius:4px;
  padding:10px 18px;
  font-size:13px;
  cursor:pointer;
  transition:font-size .25s ease, padding .25s ease, opacity .25s ease,
             color .2s ease, border-color .2s ease, transform .35s cubic-bezier(.55,0,.85,.45);
}
#lessBtn:hover{
  color:var(--red);
  border-color:var(--red);
}
#lessBtn.shake{
  animation:shake .35s ease;
}
@keyframes shake{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-3px) rotate(-1deg); }
  75%{ transform:translateX(3px) rotate(1deg); }
}
#lessBtn.tossed{
  animation:toss 1.1s cubic-bezier(.55,0,.85,.45) forwards;
}
@keyframes toss{
  0%{ transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
  65%{ transform:translate(var(--toss-x,40px), 10px) rotate(140deg) scale(.75); opacity:1; }
  100%{ transform:translate(var(--toss-x,40px), 26px) rotate(240deg) scale(0); opacity:0; }
}

.trash{
  position:absolute;
  left:calc(50% + 90px);
  top:50%;
  transform:translate(-50%,-160%) scale(.4) rotate(-15deg);
  font-size:34px;
  opacity:0;
  transition:none;
  filter:grayscale(1) opacity(.85);
}
.trash.show{
  opacity:1;
  animation:trashDrop .55s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes trashDrop{
  0%{ transform:translate(-50%,-220%) scale(.3) rotate(-25deg); opacity:0; }
  60%{ transform:translate(-50%,-40%) scale(1.15) rotate(8deg); opacity:1; }
  80%{ transform:translate(-50%,-55%) scale(.95) rotate(-4deg); }
  100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
}
.trash.gulp{
  animation:gulp .4s ease;
}
@keyframes gulp{
  0%,100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  40%{ transform:translate(-50%,-50%) scale(1.35) rotate(-8deg); }
  70%{ transform:translate(-50%,-50%) scale(.9) rotate(6deg); }
}
.trash.instant-hide{
  transition:none !important;
  animation:none !important;
  opacity:0 !important;
}

.less-caption{
  margin-top:10px;
  font-size:11.5px;
  color:var(--muted);
  min-height:14px;
}

.thanks-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(10,10,10,.97);
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
  z-index:5;
}
.thanks-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.thanks-text{
  font-family:'Anton',sans-serif;
  font-size:clamp(28px,6vw,52px);
  color:var(--red);
  transform:skewX(-6deg) scale(.9);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
  padding:0 24px;
}
.thanks-overlay.show .thanks-text{
  transform:skewX(-6deg) scale(1);
}

@media (max-width:480px){
  .card{padding:32px 18px;}
}

.stickman-layer{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
  z-index:6;
  opacity:0;
  display:none;
}
.stickman-layer.active{
  display:block;
  opacity:1;
}
.stickman-group{
  transform-box:fill-box;
}

/* paleta tip "muncitor" - piele, tricou albastru-gri, pantaloni denim, casca galbena */
.sm-torso-block{
  fill:#5b7a9d;
  stroke:#2c3e50;
  stroke-width:1.4;
}
.sm-belt{
  fill:#3a3a3a;
}
.sm-head-block{
  fill:#d9a979;
  stroke:#8a5a35;
  stroke-width:1.4;
}
.sm-eye{
  fill:#2c2c2c;
}
.sm-mouth{
  fill:#8a5a35;
  opacity:.55;
}
.sm-arm-block{
  fill:#d9a979;
  stroke:#8a5a35;
  stroke-width:1.3;
}
.sm-arm-back{
  fill:#c79868;
}
.sm-hand{
  fill:#d9a979;
  stroke:#8a5a35;
  stroke-width:1.2;
}
.sm-leg-block{
  fill:#3e5570;
  stroke:#23303f;
  stroke-width:1.3;
}
.sm-leg-back{
  fill:#33495f;
}
.sm-boot{
  fill:#2a2a2a;
  stroke:#161616;
  stroke-width:1;
}
.sm-helmet{
  fill:#f0c93b;
  stroke:#a8860f;
  stroke-width:1.4;
}
.sm-helmet-brim{
  fill:#e0b82e;
  stroke:#a8860f;
  stroke-width:1;
}
.sm-helmet-knob{
  fill:#e0b82e;
  stroke:#a8860f;
  stroke-width:1;
}

.ghost-btn{
  position:fixed;
  z-index:7;
  pointer-events:none;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--muted);
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  display:none;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
}
.ghost-btn.active{
  display:flex;
}

/* gaura de glont */
.bullet-hole{
  position:fixed;
  z-index:8;
  pointer-events:none;
  display:none;
  width:0;
  height:0;
}
.bullet-hole.active{
  display:block;
}

/* explozie */
@keyframes explode-scale{
  0%{ transform:translate(-50%,-50%) scale(0); opacity:1; }
  40%{ transform:translate(-50%,-50%) scale(1.3); opacity:1; }
  70%{ transform:translate(-50%,-50%) scale(1.6); opacity:.7; }
  100%{ transform:translate(-50%,-50%) scale(2.2); opacity:0; }
}
@keyframes spark-fly{
  0%{ transform:translate(0,0) scale(1); opacity:1; }
  100%{ transform:translate(var(--sx),var(--sy)) scale(0); opacity:0; }
}
.explosion-layer{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
  z-index:9;
  display:none;
}
.explosion-layer.active{
  display:block;
}

/* fum dupa explozie */
@keyframes smoke-rise{
  0%{ transform:translate(-50%,-50%) scale(.4); opacity:.6; }
  60%{ transform:translate(-50%,-80%) scale(1.4); opacity:.3; }
  100%{ transform:translate(-50%,-110%) scale(2); opacity:0; }
}

/* pistol flash */
.gun-flash{
  position:absolute;
  width:18px;
  height:18px;
  background:radial-gradient(circle, #fff 0%, #ffdd00 40%, transparent 70%);
  border-radius:50%;
  opacity:0;
  pointer-events:none;
}
.gun-flash.fire{
  animation:flash-anim .12s ease-out forwards;
}
@keyframes flash-anim{
  0%{ opacity:1; transform:scale(.5); }
  40%{ opacity:1; transform:scale(1.4); }
  100%{ opacity:0; transform:scale(.8); }
}

/* glontul in zbor */
.bullet-proj{
  position:fixed;
  z-index:8;
  width:8px;
  height:4px;
  background:#d4c87a;
  border-radius:50% 30% 30% 50%;
  pointer-events:none;
  display:none;
  transform-origin:center center;
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="wrap">
  <h1>DONAȚII<span>.</span></h1>
  <p class="subhead" id="subhead"><span id="subheadText">Donațiile nu sunt obligatorii.</span><span class="wink" id="wink">;)</span></p>

  <div class="card">
    <button id="donateBtn">Donează 5€</button>

    <div class="less-row">
      <button id="lessBtn">Donează mai puțin</button>
      <span class="trash" id="trash">🗑️</span>
    </div>
  </div>

  <div class="footer-note" id="footerNote">prețul e după suflet.</div>
</div>

<svg id="stickmanLayer" class="stickman-layer" xmlns="http://www.w3.org/2000/svg">
  <g id="stickmanGroup" class="stickman-group">

    <!-- picior din spate (se deseneaza primul ca sa fie sub corp la suprapunere) -->
    <g class="sm-pivot sm-leg-r" transform="translate(5,30)">
      <rect x="-5" y="0" width="10" height="24" rx="2" class="sm-leg-block sm-leg-back"/>
      <rect x="-5" y="22" width="10" height="5" rx="1" class="sm-boot"/>
    </g>

    <!-- brat din spate -->
    <g class="sm-pivot sm-arm-r" transform="translate(9,-1)">
      <rect x="-4" y="0" width="8" height="22" rx="2" class="sm-arm-block sm-arm-back"/>
      <rect x="-4.5" y="19" width="9" height="6" rx="1.5" class="sm-hand"/>
    </g>

    <!-- corp principal -->
    <rect x="-9" y="-1" width="18" height="32" rx="2" class="sm-torso-block"/>
    <rect x="-9" y="6" width="18" height="3" class="sm-belt"/>

    <!-- picior din fata -->
    <g class="sm-pivot sm-leg-l" transform="translate(-5,30)">
      <rect x="-5" y="0" width="10" height="24" rx="2" class="sm-leg-block sm-leg-front"/>
      <rect x="-5" y="22" width="10" height="5" rx="1" class="sm-boot"/>
    </g>

    <!-- cap -->
    <rect x="-9" y="-22" width="18" height="18" rx="2" class="sm-head-block"/>
    <rect x="-4" y="-15" width="3.4" height="3.4" class="sm-eye"/>
    <rect x="2" y="-15" width="3.4" height="3.4" class="sm-eye"/>
    <rect x="-3" y="-9" width="7" height="2" rx="1" class="sm-mouth"/>

    <!-- casca de muncitor -->
    <path d="M -10.5 -22 Q -10.5 -32 0 -32 Q 10.5 -32 10.5 -22 Z" class="sm-helmet"/>
    <rect x="-10.5" y="-23" width="21" height="3.4" rx="1" class="sm-helmet-brim"/>
    <rect x="-1.6" y="-32" width="3.2" height="3" class="sm-helmet-knob"/>

    <!-- brat din fata (peste corp, deseneaza-l ultimul ca sa fie vizibil) -->
    <g class="sm-pivot sm-arm-l" transform="translate(-9,-1)">
      <rect x="-4" y="0" width="8" height="22" rx="2" class="sm-arm-block sm-arm-front"/>
      <rect x="-4.5" y="19" width="9" height="6" rx="1.5" class="sm-hand"/>
    </g>
  </g>
</svg>

<div class="ghost-btn" id="ghostBtn">Donează mai puțin</div>

<!-- pistol vizibil in mana stickman-ului, randat deasupra -->
<svg id="gunLayer" style="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:7;display:none;" xmlns="http://www.w3.org/2000/svg">
  <g id="gunGroup">
    <!-- corp pistol -->
    <rect x="-14" y="-4" width="22" height="9" rx="2" fill="#2a2a2a" stroke="#111" stroke-width="1"/>
    <!-- teava -->
    <rect x="8" y="-3" width="12" height="5" rx="1" fill="#1a1a1a" stroke="#111" stroke-width="1"/>
    <!-- maner -->
    <rect x="-11" y="4" width="8" height="11" rx="2" fill="#3a2a1a" stroke="#111" stroke-width="1"/>
    <!-- garda tragaci -->
    <path d="M -6 5 Q -4 10 -1 9" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- tragaci -->
    <rect x="-4" y="5" width="2" height="6" rx="1" fill="#1a1a1a"/>
    <!-- flash la teavă -->
    <circle id="gunFlash" cx="20" cy="-1" r="9" fill="radial-gradient(circle,#fff,#ffdd00)" opacity="0"/>
  </g>
</svg>

<!-- glont in zbor -->
<div id="bulletProj" class="bullet-proj"></div>

<!-- layer explozie SVG -->
<svg id="explosionLayer" class="explosion-layer" xmlns="http://www.w3.org/2000/svg">
</svg>

<div class="thanks-overlay" id="thanksOverlay">
  <div class="thanks-text">Mulțumesc dar nu trebuie.<br>Enjoy Stream</div>
</div>

<script>
const btn = document.getElementById('donateBtn');
const particles = document.getElementById('particles');

const steps = [
  { amount: 5 },
  { amount: 10 },
  { amount: 20 },
  { amount: 50 },
  { amount: 100 },
  { amount: 500 },
  { amount: 1000 },
  { amount: 9999 },
];

let i = 0;

function fmt(n){
  return n.toLocaleString('ro-RO');
}

function render(){
  const s = steps[i];
  btn.textContent = `Donează ${fmt(s.amount)}€`;
  btn.classList.remove('bump');
  void btn.offsetWidth;
  btn.classList.add('bump');
}

btn.addEventListener('mouseenter', () => {
  if (i < steps.length - 1) i++;
  render();
  burst();
});

const thanksOverlay = document.getElementById('thanksOverlay');

btn.addEventListener('click', (e) => {
  e.preventDefault();
  thanksActive = true;
  thanksOverlay.classList.add('show');
  setTimeout(()=> {
    thanksOverlay.classList.remove('show');
    thanksActive = false;
  }, 1600);
});

thanksOverlay.addEventListener('click', () => {
  thanksOverlay.classList.remove('show');
  thanksActive = false;
});

let thanksActive = false;

function burst(big){
  if (thanksActive) return;
  const symbols = ['♥','€','✦'];
  const count = big ? 10 : 4;
  for (let k = 0; k < count; k++){
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = (Math.random()*100) + 'vw';
    p.style.fontSize = (14 + Math.random()*14) + 'px';
    p.style.setProperty('--drift', (Math.random()*80 - 40) + 'px');
    p.style.animationDuration = (4 + Math.random()*3) + 's';
    particles.appendChild(p);
    setTimeout(()=> p.remove(), 7500);
  }
}

render();
// un mic puseu ambiental din când în când, ca pagina sa para vie
setInterval(()=> burst(false), 3200);

// subtitlu: la incarcare arata 1 secunda mesajul "obligatorii", apoi revine si ramane fix
const subhead = document.getElementById('subhead');
const subheadText = document.getElementById('subheadText');
const wink = document.getElementById('wink');

let subheadLocked = false;

subhead.addEventListener('mouseenter', () => {
  if (subheadLocked) return;
  subheadText.textContent = 'Donațiile sunt obligatorii.';
  subhead.style.color = 'var(--red)';
});

subhead.addEventListener('mouseleave', () => {
  if (subheadLocked) return;
  subheadText.textContent = 'Donațiile nu sunt obligatorii.';
  subhead.style.color = '';

  subheadLocked = true;
  wink.classList.add('show');

  setTimeout(() => {
    wink.classList.remove('show');
  }, 1400);

  setTimeout(() => {
    subheadLocked = false;
  }, 10000);
});

// butonul "doneaza mai putin" - se micsoreaza progresiv la fiecare click
const lessBtn = document.getElementById('lessBtn');
const trash = document.getElementById('trash');

const LESS_TEXT = 'Donează mai puțin';
const LESS_START_SIZE = 13;
const LESS_MIN_SIZE = 10;
const LESS_SIZE_STEP = 0.4;

const LESS_START_PAD_V = 10;
const LESS_START_PAD_H = 18;
const LESS_MIN_PAD_V = 6;
const LESS_MIN_PAD_H = 10;

const RESET_AFTER_MS = 1800;

let lessClicks = 0;
let lessFrozen = false;

function lessSize(){
  return Math.max(LESS_MIN_SIZE, LESS_START_SIZE - lessClicks * LESS_SIZE_STEP);
}
function lessPadV(){
  return Math.max(LESS_MIN_PAD_V, LESS_START_PAD_V - lessClicks * 1.2);
}
function lessPadH(){
  return Math.max(LESS_MIN_PAD_H, LESS_START_PAD_H - lessClicks * 2.4);
}

function renderLess(){
  lessBtn.textContent = LESS_TEXT;
  lessBtn.style.fontSize = lessSize() + 'px';
  lessBtn.style.padding = `${lessPadV()}px ${lessPadH()}px`;
  lessBtn.classList.remove('shake');
  void lessBtn.offsetWidth;
  lessBtn.classList.add('shake');
}

// dimensiunile reale ale butonului mare, in pixeli, ca sa creasca frumos
const BTN_START_FONT = 38;
const BTN_FONT_STEP = 9;
const BTN_MAX_FONT = 110;

const BTN_START_PAD_V = 18;
const BTN_START_PAD_H = 38;
const BTN_PAD_STEP = 4;

let bigFont = BTN_START_FONT;
let bigPadV = BTN_START_PAD_V;
let bigPadH = BTN_START_PAD_H;

function growBigButton(){
  bigFont += BTN_FONT_STEP;
  bigPadV += BTN_PAD_STEP;
  bigPadH += BTN_PAD_STEP * 1.6;

  if (bigFont >= BTN_MAX_FONT){
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
    burst(true);

    bigFont = BTN_START_FONT;
    bigPadV = BTN_START_PAD_V;
    bigPadH = BTN_START_PAD_H;

    setTimeout(() => {
      // resetam marimea INSTANT (fara tranzitia CSS de .3s), ca layout-ul paginii
      // sa fie deja revenit la starea initiala inainte sa calculam pozitia gaurii de glont
      btn.style.transition = 'none';
      btn.style.fontSize = bigFont + 'px';
      btn.style.padding = `${bigPadV}px ${bigPadH}px`;
      void btn.offsetWidth;
      btn.style.transition = '';
    }, 225);

    setTimeout(() => {
      tossLessButton();
    }, 260);
    return;
  }

  btn.style.fontSize = bigFont + 'px';
  btn.style.padding = `${bigPadV}px ${bigPadH}px`;
}

function resetBigButton(){
  bigFont = BTN_START_FONT;
  bigPadV = BTN_START_PAD_V;
  bigPadH = BTN_START_PAD_H;
  btn.classList.remove('pop');
  btn.style.fontSize = '';
  btn.style.padding = '';
}

btn.addEventListener('animationend', (e) => {
  if (e.animationName === 'pop'){
    btn.classList.remove('pop');
  }
});

const stickmanLayer = document.getElementById('stickmanLayer');
const stickmanGroup = document.getElementById('stickmanGroup');
const ghostBtn = document.getElementById('ghostBtn');
const gunLayer = document.getElementById('gunLayer');
const gunGroup = document.getElementById('gunGroup');
const gunFlash = document.getElementById('gunFlash');
const bulletProj = document.getElementById('bulletProj');
const explosionLayer = document.getElementById('explosionLayer');

const smArmL = stickmanGroup.querySelector('.sm-arm-l');
const smArmR = stickmanGroup.querySelector('.sm-arm-r');
const smLegL = stickmanGroup.querySelector('.sm-leg-l');
const smLegR = stickmanGroup.querySelector('.sm-leg-r');

function rotatePivot(el, baseX, baseY, angle){
  el.setAttribute('transform', `translate(${baseX},${baseY}) rotate(${angle})`);
}

function easeInOutQuad(t){
  return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2) / 2;
}
function easeOutQuad(t){
  return 1 - Math.pow(1-t, 2);
}
function easeRun(t){
  // accelerare scurta la start, apoi viteza aproape constanta - simuleaza alergarea
  return t < 0.18 ? easeOutQuad(t / 0.18) * 0.18 : 0.18 + (t - 0.18) * (1/0.82) * 0.82;
}
function lerp(a, b, t){ return a + (b - a) * t; }

// pozitioneaza pistolul EXACT in mana din fata a stickman-ului: replica acelasi lant de
// transformari ca bratul real (translate corp -> inclinare -> scara/oglindire -> pivot brat ->
// rotatia bratului -> offset pana la mana), ca pistolul sa ramana lipit de mana la orice unghi,
// nu doar cand bratul atarna in jos
function positionGunInHand(x, by, scale, flip, tiltDeg, armAngleDeg){
  const tiltSigned = flip ? -tiltDeg : tiltDeg;
  const flipSign = flip ? -1 : 1;
  // rotate(90) corecteaza axa proprie a desenului pistolului (teava era aliniata cu axa
  // gresita) ca teava sa fie indreptata pe directia in care e intins bratul (spre tinta),
  // nu in sus
  gunGroup.setAttribute('transform',
    `translate(${x},${by}) rotate(${tiltSigned}) scale(${flipSign * scale},${scale}) translate(-9,${ARM_PIVOT_Y}) rotate(${armAngleDeg}) translate(0,22) scale(0.55) rotate(90)`
  );
}

// citeste, dupa pozitionare, locul real (in pixeli de ecran) al varfului tevii - de aici pleaca glontul
function gunMuzzleScreenPos(){
  const ctm = gunGroup.getScreenCTM();
  if (!ctm) return {x:0, y:0};
  const pt = new DOMPoint(20, -0.5).matrixTransform(ctm);
  return {x: pt.x, y: pt.y};
}

// declanseaza flash la teava pistolului (animatie SVG rapida)
function fireFlash(){
  gunFlash.setAttribute('opacity', '1');
  gunFlash.animate([
    {opacity:1, r:9},
    {opacity:1, r:14},
    {opacity:0, r:8}
  ], {duration:110, easing:'ease-out', fill:'forwards'}).onfinish = () => {
    gunFlash.setAttribute('opacity', '0');
  };
}

// creeaza gaura de glont la pozitia data
function createBulletHole(cx, cy){
  // creaza un grup SVG cu gaura de glont peste buton
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText = `position:fixed;left:0;top:0;width:100vw;height:100vh;pointer-events:none;z-index:10;`;
  // gaura neagra centrala
  const hole = document.createElementNS('http://www.w3.org/2000/svg','circle');
  hole.setAttribute('cx', cx); hole.setAttribute('cy', cy); hole.setAttribute('r', '7');
  hole.setAttribute('fill', '#000'); hole.setAttribute('stroke', '#1a1a1a'); hole.setAttribute('stroke-width', '1');
  // crapaturi radiale
  const cracks = document.createElementNS('http://www.w3.org/2000/svg','g');
  const crackAngles = [0,38,72,115,152,195,238,280,320];
  crackAngles.forEach(a => {
    const rad = a * Math.PI/180;
    const len = 10 + Math.random()*14;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', cx + Math.cos(rad)*7); line.setAttribute('y1', cy + Math.sin(rad)*7);
    line.setAttribute('x2', cx + Math.cos(rad)*(7+len)); line.setAttribute('y2', cy + Math.sin(rad)*(7+len));
    line.setAttribute('stroke', '#1a1a1a'); line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-linecap', 'round');
    cracks.appendChild(line);
    // micro-spartura secundara
    if (Math.random() > 0.4){
      const a2 = (a + 15 + Math.random()*20) * Math.PI/180;
      const len2 = 5 + Math.random()*8;
      const line2 = document.createElementNS('http://www.w3.org/2000/svg','line');
      line2.setAttribute('x1', cx + Math.cos(rad)*(7+len*0.5)); line2.setAttribute('y1', cy + Math.sin(rad)*(7+len*0.5));
      line2.setAttribute('x2', cx + Math.cos(a2)*(7+len*0.5+len2)); line2.setAttribute('y2', cy + Math.sin(a2)*(7+len*0.5+len2));
      line2.setAttribute('stroke', '#111'); line2.setAttribute('stroke-width', '1');
      line2.setAttribute('stroke-linecap', 'round');
      cracks.appendChild(line2);
    }
  });
  // inel de impact
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx', cx); ring.setAttribute('cy', cy); ring.setAttribute('r', '10');
  ring.setAttribute('fill', 'none'); ring.setAttribute('stroke', '#333'); ring.setAttribute('stroke-width', '2'); ring.setAttribute('opacity', '0.6');
  svg.appendChild(ring);
  svg.appendChild(cracks);
  svg.appendChild(hole);
  document.body.appendChild(svg);
  return svg;
}

// creeaza explozia de particule la pozitia data
function triggerExplosion(cx, cy){
  explosionLayer.style.display = 'block';

  const colors = ['#ff4400','#ff8800','#ffcc00','#ff2200','#ffee55','#fff'];
  const particleCount = 28;

  // inel de foc central
  const fireRing = document.createElementNS('http://www.w3.org/2000/svg','circle');
  fireRing.setAttribute('cx', cx); fireRing.setAttribute('cy', cy); fireRing.setAttribute('r', '8');
  fireRing.setAttribute('fill', '#ff6600'); fireRing.setAttribute('opacity', '0.9');
  explosionLayer.appendChild(fireRing);

  // sparks radiale
  for(let k=0; k<particleCount; k++){
    const angle = (k / particleCount) * Math.PI * 2 + Math.random()*0.3;
    const dist = 30 + Math.random() * 80;
    const size = 2 + Math.random() * 6;
    const isCircle = Math.random() > 0.4;
    let el;
    if(isCircle){
      el = document.createElementNS('http://www.w3.org/2000/svg','circle');
      el.setAttribute('cx', cx); el.setAttribute('cy', cy);
      el.setAttribute('r', size/2);
    } else {
      el = document.createElementNS('http://www.w3.org/2000/svg','rect');
      el.setAttribute('x', cx-size/2); el.setAttribute('y', cy-size/2);
      el.setAttribute('width', size); el.setAttribute('height', size);
      el.setAttribute('rx', '1');
    }
    el.setAttribute('fill', colors[Math.floor(Math.random()*colors.length)]);
    el.setAttribute('opacity', '1');
    explosionLayer.appendChild(el);

    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const dur = 350 + Math.random() * 300;
    el.animate([
      {transform:`translate(0,0) scale(1)`, opacity:1},
      {transform:`translate(${tx}px,${ty}px) scale(0)`, opacity:0}
    ], {duration:dur, easing:'ease-out', fill:'forwards'});
  }

  // 3 bulgari mari de foc
  for(let k=0;k<3;k++){
    const angle = Math.random()*Math.PI*2;
    const blob = document.createElementNS('http://www.w3.org/2000/svg','circle');
    blob.setAttribute('cx', cx); blob.setAttribute('cy', cy);
    blob.setAttribute('r', 18 + Math.random()*18);
    blob.setAttribute('fill', k===0 ? '#ff6600' : k===1 ? '#ff3300' : '#ffaa00');
    blob.setAttribute('opacity', '0.85');
    explosionLayer.appendChild(blob);
    const tx2 = Math.cos(angle)*45;
    const ty2 = Math.sin(angle)*45 - 20;
    blob.animate([
      {transform:`translate(0,0) scale(0.1)`, opacity:.9},
      {transform:`translate(${tx2/2}px,${ty2/2}px) scale(1.2)`, opacity:.7},
      {transform:`translate(${tx2}px,${ty2}px) scale(1.8)`, opacity:0}
    ], {duration:500+Math.random()*200, easing:'ease-out', fill:'forwards'});
  }

  // inel shockwave
  const shockwave = document.createElementNS('http://www.w3.org/2000/svg','circle');
  shockwave.setAttribute('cx', cx); shockwave.setAttribute('cy', cy); shockwave.setAttribute('r', '5');
  shockwave.setAttribute('fill', 'none'); shockwave.setAttribute('stroke', '#ffcc00'); shockwave.setAttribute('stroke-width', '3');
  explosionLayer.appendChild(shockwave);
  shockwave.animate([
    {r:5, opacity:1, strokeWidth:'3'},
    {r:90, opacity:0, strokeWidth:'0.5'}
  ], {duration:450, easing:'ease-out', fill:'forwards'});

  // fum dupa
  setTimeout(()=>{
    for(let k=0;k<4;k++){
      const smoke = document.createElementNS('http://www.w3.org/2000/svg','circle');
      smoke.setAttribute('cx', cx + (Math.random()-0.5)*30); smoke.setAttribute('cy', cy);
      smoke.setAttribute('r', 12 + Math.random()*10);
      smoke.setAttribute('fill', '#555'); smoke.setAttribute('opacity', '0.55');
      explosionLayer.appendChild(smoke);
      const tx3 = (Math.random()-0.5)*40;
      smoke.animate([
        {transform:`translate(0,0) scale(0.3)`, opacity:.55},
        {transform:`translate(${tx3}px,-60px) scale(1.8)`, opacity:0}
      ], {duration:900+Math.random()*400, easing:'ease-out', fill:'forwards'});
    }
    setTimeout(()=>{
      while(explosionLayer.firstChild) explosionLayer.removeChild(explosionLayer.firstChild);
      explosionLayer.style.display='none';
    }, 1400);
  }, 250);
}

function setStickman(x, y, scale, flip, bob, tilt){
  const by = y + (bob || 0);
  const t = tilt || 0;
  stickmanGroup.setAttribute(
    'transform',
    `translate(${x},${by}) rotate(${flip ? -t : t}) scale(${flip ? -scale : scale},${scale})`
  );
}

// pivoturi reale: umeri la (+-9,-1), solduri la (+-5,30)
const ARM_PIVOT_Y = -1;
const LEG_PIVOT_Y = 30;

function walkCycle(t, legsOnly){
  // alergare: picior fata si brat opus merg impreuna, amplitudine mare, ca o fuga reala
  const phase = t * Math.PI * 2;
  const legSwing = Math.sin(phase) * 55;
  const armSwing = Math.sin(phase) * 48;

  rotatePivot(smLegL, -5, LEG_PIVOT_Y, legSwing);
  rotatePivot(smLegR, 5, LEG_PIVOT_Y, -legSwing);

  if (!legsOnly){
    rotatePivot(smArmL, -9, ARM_PIVOT_Y, -armSwing);
    rotatePivot(smArmR, 9, ARM_PIVOT_Y, armSwing);
  }

  // bob mai pronuntat, dublu pe ciclu (caracteristic alergarii, nu mersului)
  return Math.abs(Math.sin(phase)) * -7;
}

function armsUp(amount){
  // amount: 0 = lasate, 1 = ridicate complet (ducand obiectul)
  const angle = lerp(0, -155, amount);
  rotatePivot(smArmL, -9, ARM_PIVOT_Y, angle);
  rotatePivot(smArmR, 9, ARM_PIVOT_Y, -angle);
  rotatePivot(smLegL, -5, LEG_PIVOT_Y, 0);
  rotatePivot(smLegR, 5, LEG_PIVOT_Y, 0);
}

function animate(duration, drawFn){
  return new Promise((resolve) => {
    const start = performance.now();
    function frame(now){
      const t = Math.min(1, (now - start) / duration);
      drawFn(t);
      if (t < 1){
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

async function tossLessButton(){
  if (lessFrozen) return;
  lessFrozen = true;

  const btnRect = lessBtn.getBoundingClientRect();
  const btnCx = btnRect.left + btnRect.width / 2;
  const btnCy = btnRect.top + btnRect.height / 2;

  // stickman intra din stanga, la nivelul butonului
  const groundY = btnCy + 16;
  const startX = -60;
  const scale = 2.1;

  stickmanLayer.classList.add('active');
  gunLayer.style.display = 'none';     // pistolul NU se vede cat timp alearga
  gunGroup.setAttribute('opacity', '0');
  setStickman(startX, groundY, scale, false);

  // 1) stickman alearga din margine pana la distanta de tragere - fara pistol in mana
  const approachX = btnCx - 180;
  await animate(1100, (t) => {
    const x = lerp(startX, approachX, easeRun(t));
    const bob = walkCycle(t * 5.5);
    const tilt = Math.min(8, t * 30);
    setStickman(x, groundY, scale, false, bob, tilt);
  });

  // 2) stickman se opreste si incepe sa ridice bratul - pistolul tot nu apare inca
  const AIM_AMOUNT = 0.55;
  await animate(280, (t) => {
    const tt = easeInOutQuad(t);
    const tilt = lerp(8, 0, tt);
    armsUp(tt * AIM_AMOUNT);
    setStickman(approachX, groundY, scale, false, 0, tilt);
  });

  // 2b) ULTIMUL CADRU: bratul e complet intins -> pistolul apare brusc, exact in mana,
  // ca si cum tocmai l-a scos
  const aimAngle = lerp(0, -155, AIM_AMOUNT);
  positionGunInHand(approachX, groundY, scale, false, 0, aimAngle);
  gunLayer.style.display = 'block';
  gunGroup.animate(
    [{opacity:0}, {opacity:1}],
    {duration:90, easing:'ease-out', fill:'forwards'}
  );

  await new Promise(r => setTimeout(r, 120));

  // 3) FOC! - flash la teava + glont in zbor, pornind exact din teava pistolului din mana
  fireFlash();

  const muzzle = gunMuzzleScreenPos();

  bulletProj.style.display = 'block';
  bulletProj.style.left = muzzle.x + 'px';
  bulletProj.style.top = muzzle.y + 'px';

  const bulletDur = 90;
  const bulletStart = performance.now();
  await new Promise(resolve => {
    function bulletFrame(now){
      const t = Math.min(1, (now - bulletStart) / bulletDur);
      const bx = lerp(muzzle.x, btnCx, t);
      const by = lerp(muzzle.y, btnCy, t);
      bulletProj.style.left = bx + 'px';
      bulletProj.style.top = by + 'px';
      bulletProj.style.opacity = t < 0.9 ? '1' : String(1 - (t-0.9)/0.1);
      if(t < 1) requestAnimationFrame(bulletFrame);
      else resolve();
    }
    requestAnimationFrame(bulletFrame);
  });
  bulletProj.style.display = 'none';

  // 4) IMPACT: butonul real dispare, iar exact in locul lui apare gaura de glont + explozie
  lessBtn.style.visibility = 'hidden';
  const holeEl = createBulletHole(btnCx, btnCy);

  // tremur scurt al ecranului
  document.body.animate([
    {transform:'translate(0,0)'},
    {transform:'translate(-4px, 3px)'},
    {transform:'translate(5px, -2px)'},
    {transform:'translate(-3px, 1px)'},
    {transform:'translate(0,0)'}
  ], {duration:180, easing:'ease-out'});

  triggerExplosion(btnCx, btnCy);

  await new Promise(r => setTimeout(r, 350));

  // 5) stickman pleaca din scena spre dreapta, cu pistolul tot in mana
  const exitX = window.innerWidth + 80;
  await animate(900, (t) => {
    const x = lerp(approachX, exitX, easeRun(t));
    const runT = t * 5.5 + 0.5;
    const bob = walkCycle(runT);
    const tilt = Math.min(8, t * 30);
    setStickman(x, groundY, scale, true, bob, tilt);

    // acelasi unghi de brat ca in walkCycle, ca pistolul sa ramana lipit de mana cat alearga
    const armAngle = -Math.sin(runT * Math.PI * 2) * 48;
    positionGunInHand(x, groundY + (bob || 0), scale, true, tilt, armAngle);
  });

  stickmanLayer.classList.remove('active');
  gunLayer.style.display = 'none';

  // gaura de glont ramane vizibila un moment, apoi dispare la reset
  setTimeout(() => {
    if(holeEl && holeEl.parentNode) holeEl.parentNode.removeChild(holeEl);
    setTimeout(resetLessButton, 400);
  }, RESET_AFTER_MS - 600);
}

function resetLessButton(){
  lessClicks = 0;
  lessFrozen = false;

  lessBtn.style.visibility = '';
  lessBtn.classList.remove('tossed');
  lessBtn.style.fontSize = lessSize() + 'px';
  lessBtn.style.padding = `${lessPadV()}px ${lessPadH()}px`;
  lessBtn.textContent = LESS_TEXT;

  ghostBtn.style.transform = '';
  ghostBtn.classList.remove('active');

  bigFont = BTN_START_FONT;
  bigPadV = BTN_START_PAD_V;
  bigPadH = BTN_START_PAD_H;
  btn.style.fontSize = '';
  btn.style.padding = '';
}

function triggerLess(){
  if (lessFrozen) return;

  lessClicks++;
  renderLess();
  growBigButton();
  burst();
}

lessBtn.addEventListener('click', (e) => {
  e.preventDefault();
  triggerLess();
});

lessBtn.style.fontSize = lessSize() + 'px';
lessBtn.style.padding = `${lessPadV()}px ${lessPadH()}px`;
</script>
